name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:15.13-alpine
        env:
          POSTGRES_USER: platform
          POSTGRES_PASSWORD: test-only
          POSTGRES_DB: security_platform_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U platform -d security_platform_test"
          --health-interval 5s --health-timeout 3s --health-retries 20
      redis:
        image: redis:7.4.5-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://platform:test-only@localhost:5432/security_platform_test?sslmode=disable
      TEST_REDIS_ADDR: localhost:6379
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0a12ed9d6a96ab950c8f026ed9f722fe0da7ef32
        with:
          go-version: "1.25.7"
          cache: true
      - name: Formatting
        run: test -z "$(gofmt -l .)"
      - name: Vet
        run: go vet ./...
      - name: Tests
        run: go test ./...
      - name: Race tests
        run: go test -race ./...
      - name: Build
        run: go build ./...
      - name: Migration validation
        run: go test ./internal/migrations -run TestPostgresMigrationsAreIdempotent -count=1
      - name: Dependency vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 ./...
      - name: Docker image build
        run: docker build -f worker/Dockerfile .
